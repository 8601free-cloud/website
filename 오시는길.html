<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="layout.css">

<div id="site-header"></div>

<style>
  html, body {
    margin: 0;
    padding: 0;
  }

  * {
    box-sizing: border-box;
  }

  :root{
    --dsw-green:#2f6b46;
    --dsw-green-deep:#1f4f34;
    --dsw-green-dark:#173d29;
    --dsw-green-soft:#edf5ef;
    --dsw-gold:#a97a34;
    --dsw-text:#223129;
    --dsw-sub:#55685d;
    --dsw-white:#ffffff;
    --dsw-shadow:
      0 14px 34px rgba(22,40,29,.12),
      0 4px 10px rgba(22,40,29,.06);
    --dsw-shadow-strong:
      0 24px 52px rgba(22,40,29,.18),
      0 8px 18px rgba(22,40,29,.10);
  }

  .dsw-map-page{
    font-family:'Pretendard','Noto Sans KR',sans-serif;
    color:var(--dsw-text);
    background:
      radial-gradient(circle at 8% 8%, rgba(136,184,154,.18), transparent 24%),
      radial-gradient(circle at 92% 14%, rgba(169,122,52,.10), transparent 22%),
      linear-gradient(180deg, #f4efe5 0%, #f7f8f3 34%, #edf4ee 100%);
    padding:30px 20px 110px;
  }

  .dsw-map-container{
    max-width:1280px;
    margin:0 auto;
  }

  .dsw-map-hero{
    position:relative;
    margin-bottom:22px;
    padding:34px 30px;
    border-radius:30px;
    background:
      linear-gradient(135deg, rgba(255,255,255,.96) 0%, rgba(245,248,243,.96) 50%, rgba(236,244,237,.97) 100%);
    box-shadow:var(--dsw-shadow);
    overflow:hidden;
    transition:
      transform .38s ease,
      box-shadow .38s ease,
      background .38s ease;
    transform-style:preserve-3d;
    will-change:transform;
  }

  .dsw-map-hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 18% 18%, rgba(255,255,255,.75), transparent 30%),
      radial-gradient(circle at 84% 78%, rgba(169,122,52,.10), transparent 26%),
      linear-gradient(135deg, rgba(255,255,255,.10) 0%, rgba(227,241,232,.24) 55%, rgba(244,239,229,.32) 100%);
    pointer-events:none;
  }

  .dsw-map-hero::after{
    content:"";
    position:absolute;
    right:-36px;
    bottom:-42px;
    width:220px;
    height:220px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(82,140,103,.16), transparent 68%);
    pointer-events:none;
    transition:transform .38s ease, opacity .38s ease;
    opacity:.95;
  }

  .dsw-map-hero:hover{
    transform:translateY(-6px) perspective(1400px) rotateX(3deg) rotateY(-2deg);
    background:
      linear-gradient(135deg, rgba(255,255,255,.98) 0%, rgba(227,241,232,.97) 58%, rgba(244,239,229,.98) 100%);
    box-shadow:var(--dsw-shadow-strong);
  }

  .dsw-map-hero:hover::after{
    transform:scale(1.08);
    opacity:1;
  }

  .dsw-map-hero > *{
    position:relative;
    z-index:1;
  }

  .dsw-map-kicker{
    display:inline-flex;
    align-items:center;
    gap:10px;
    width:max-content;
    padding:10px 18px 10px 16px;
    margin-bottom:18px;
    color:#234d34;
    font-size:13px;
    font-weight:800;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:linear-gradient(180deg, #fbf7ef 0%, #ebe0ca 100%);
    border:1px solid rgba(117,90,37,.20);
    border-radius:14px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.65),
      0 10px 20px rgba(70,55,28,.10);
  }

  .dsw-map-kicker::before{
    content:"";
    width:10px;
    height:10px;
    border-radius:50%;
    background:linear-gradient(180deg, #4f8a62 0%, #2f6b46 100%);
    box-shadow:0 0 0 4px rgba(79,138,98,.12);
    flex:0 0 auto;
  }

  .dsw-map-title{
    margin:0 0 10px;
    font-size:42px;
    line-height:1.15;
    font-weight:900;
    letter-spacing:-0.04em;
    color:#213126;
  }

  .dsw-map-title-brand{
    background:linear-gradient(180deg,#3f7a55 0%, #24563a 58%, #173d29 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    color:transparent;
  }

  .dsw-map-desc{
    margin:0;
    max-width:760px;
    font-size:18px;
    line-height:1.75;
    color:#506257;
    word-break:keep-all;
  }

  .dsw-map-wrap{
    position:relative;
    height:70vh;
    min-height:540px;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.12);
    background:#dfe9df;
  }

  #full-map{
    width:100%;
    height:100%;
  }

  .map-location-panel{
    position:absolute;
    left:20px;
    bottom:20px;
    width:340px;
    max-width:calc(100% - 40px);
    padding:16px;
    border-radius:22px;
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);
    box-shadow:0 18px 40px rgba(0,0,0,.18);
    z-index:10;
    border:1px solid rgba(47,107,70,.10);
  }

  .map-location-panel-title{
    font-size:16px;
    font-weight:800;
    color:#1f4d35;
    margin-bottom:6px;
  }

  .map-location-panel-sub{
    font-size:13px;
    color:#66706a;
    margin-bottom:12px;
    line-height:1.45;
  }

  .map-location-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .map-location-card{
    display:block;
    width:100%;
    appearance:none;
    border:1px solid #d9dfdb;
    background:#fff;
    border-radius:15px;
    padding:14px;
    text-align:left;
    cursor:pointer;
    transition:
      transform .22s ease,
      box-shadow .22s ease,
      border-color .22s ease,
      background .22s ease;
  }

  .map-location-card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.10);
  }

  .map-location-card.active{
    border:2px solid #2f6b4b;
    background:linear-gradient(180deg, #f8fcf9 0%, #eef7f1 100%);
    box-shadow:0 12px 24px rgba(47,107,75,.12);
  }

  .map-location-card strong{
    color:#1f4d35;
    font-size:15px;
    font-weight:800;
  }

  .map-location-card .addr{
    margin-top:6px;
    font-size:13px;
    color:#5f6660;
    line-height:1.5;
    font-weight:500;
  }

  .marker-label-custom{
    background:#fff;
    padding:12px 14px;
    border-radius:14px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
    border:1px solid rgba(47,107,75,.12);
    font-family:'Pretendard','Noto Sans KR',sans-serif;
    line-height:1.45;
  }

  .marker-label-custom strong{
    color:#1f4d35;
    font-size:15px;
    font-weight:800;
  }

  .marker-label-custom .addr{
    margin-top:4px;
    color:#5f6660;
    font-size:13px;
    font-weight:500;
  }

  @media (max-width: 768px){
    .dsw-map-page{
      padding:18px 12px 90px;
    }

    .dsw-map-hero{
      padding:24px 18px;
      border-radius:22px;
    }

    .dsw-map-title{
      font-size:30px;
    }

    .dsw-map-desc{
      font-size:15px;
    }

    .dsw-map-wrap{
      height:68vh;
      min-height:460px;
      border-radius:22px;
    }

    .map-location-panel{
      left:12px;
      right:12px;
      bottom:12px;
      width:auto;
      max-width:none;
      border-radius:18px;
    }
  }
</style>

<div class="dsw-map-page">
  <div class="dsw-map-container">

    <div class="dsw-map-hero">
      <div class="dsw-map-kicker">THE SUWON CARE CENTER</div>
      <h1 class="dsw-map-title">
        <span class="dsw-map-title-brand">더수원</span> 오시는 길
      </h1>
      <p class="dsw-map-desc">시설을 선택하면 해당 위치로 이동합니다.</p>
    </div>

    <div class="dsw-map-wrap">
      <div id="full-map"></div>

      <div class="map-location-panel">
        <div class="map-location-panel-title">시설 선택</div>
        <div class="map-location-panel-sub">원하시는 지점을 눌러 위치를 확인해 주세요.</div>
        <div class="map-location-list" id="mapLocationList"></div>
      </div>
    </div>

  </div>
</div>

<div id="site-footer"></div>
<script src="layout.js"></script>

<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=igssinu6xy"></script>

<script>
  const placeList = [
    {
      title: "더수원 주간보호",
      address: "경기도 수원시 팔달구 정조로 804",
      lat: 37.2809,
      lng: 127.0153
    },
    {
      title: "더수원 요양원",
      address: "경기도 수원시 팔달구 중부대로125번길 14",
      lat: 37.2778,
      lng: 127.0282
    }
  ];

  const map = new naver.maps.Map('full-map', {
    center: new naver.maps.LatLng(placeList[0].lat, placeList[0].lng),
    zoom: 16,
    mapTypeControl: true
  });

  const placeObjects = [];
  const panel = document.getElementById('mapLocationList');

  function setActiveCard(index) {
    document.querySelectorAll('.map-location-card').forEach((card, i) => {
      card.classList.toggle('active', i === index);
    });
  }

  function focusPlace(index) {
    const p = placeObjects[index];
    if (!p) return;

    placeObjects.forEach(o => o.info.close());

    const offsetLat = window.innerWidth <= 768 ? 0.0018 : 0.0022;
    const adjustedCenter = new naver.maps.LatLng(
      p.position.lat() + offsetLat,
      p.position.lng()
    );

    map.setCenter(adjustedCenter);
    map.setZoom(17);

    setTimeout(() => {
      p.info.open(map, p.marker);
    }, 120);

    setActiveCard(index);
  }

  function initMapPage() {
    placeList.forEach((place, index) => {
      const pos = new naver.maps.LatLng(place.lat, place.lng);

      const marker = new naver.maps.Marker({
        position: pos,
        map: map
      });

      const info = new naver.maps.InfoWindow({
        content: `
          <div class="marker-label-custom">
            <strong>${place.title}</strong>
            <div class="addr">${place.address}</div>
          </div>
        `,
        borderWidth: 0,
        backgroundColor: "transparent"
      });

      placeObjects.push({ position: pos, marker, info });

      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'map-location-card';
      card.innerHTML = `
        <strong>${index + 1}. ${place.title}</strong>
        <div class="addr">${place.address}</div>
      `;
      card.addEventListener('click', () => focusPlace(index));

      panel.appendChild(card);

      naver.maps.Event.addListener(marker, 'click', () => focusPlace(index));
    });

    setTimeout(() => {
      focusPlace(0);
    }, 150);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMapPage);
  } else {
    initMapPage();
  }
</script>
