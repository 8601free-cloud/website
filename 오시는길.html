<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>오시는길 | 수원 주간보호·요양원 위치 안내 | 더수원 어르신 통합케어</title>
  <meta name="description" content="더수원 어르신 통합케어 오시는 길 안내입니다. 수원 팔달구 더수원 주간보호와 요양원의 위치, 주소, 방문 경로를 확인해보세요.">
  <meta property="og:title" content="오시는길 | 수원 주간보호·요양원 위치 안내 | 더수원 어르신 통합케어">
  <meta property="og:description" content="더수원 주간보호 및 요양원 위치와 방문 경로를 안내합니다.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="layout.css?v=20260503">
</head>
<body>

<div id="site-header"></div>

<style>
  html, body{
    margin:0;
    padding:0;
  }

  *{
    box-sizing:border-box;
  }

  :root{
    --dsw-green:#2f6b46;
    --dsw-green-deep:#1f4f34;
    --dsw-green-dark:#173d29;
    --dsw-green-light:#88b89a;
    --dsw-green-soft:#edf5ef;
    --dsw-gold:#a97a34;
    --dsw-text:#223129;
    --dsw-sub:#55685d;
    --dsw-line:rgba(47,107,70,.16);
    --dsw-white:#ffffff;
    --dsw-shadow:
      0 14px 34px rgba(22,40,29,.12),
      0 4px 10px rgba(22,40,29,.06);
    --dsw-shadow-strong:
      0 24px 52px rgba(22,40,29,.18),
      0 8px 18px rgba(22,40,29,.10);
    --dsw-inset:
      inset 0 1px 0 rgba(255,255,255,.65),
      inset 0 -1px 0 rgba(20,40,25,.05);
  }

  .dsw-map-page{
    font-family:'Pretendard','Noto Sans KR',sans-serif;
    color:var(--dsw-text);
    background:
      radial-gradient(circle at 8% 8%, rgba(136,184,154,.18), transparent 24%),
      radial-gradient(circle at 92% 14%, rgba(169,122,52,.10), transparent 22%),
      linear-gradient(180deg, #f4efe5 0%, #f7f8f3 34%, #edf4ee 100%);
    padding:30px 20px 110px;
  }

  .dsw-map-container{
    width:100%;
    max-width:1280px;
    margin:0 auto;
  }

  .dsw-map-hero{
    position:relative;
    overflow:hidden;
    margin-bottom:22px;
    padding:34px 30px;
    border-radius:30px;
    background:
      linear-gradient(135deg, rgba(255,255,255,.96) 0%, rgba(245,248,243,.96) 52%, rgba(236,244,237,.97) 100%);
    border:1px solid rgba(255,255,255,.78);
    box-shadow:var(--dsw-shadow), var(--dsw-inset);
    transform-style:preserve-3d;
    transition:
      transform .42s ease,
      box-shadow .42s ease,
      background .42s ease,
      border-color .42s ease;
  }

  .dsw-map-hero::before{
    content:"";
    position:absolute;
    right:-40px;
    bottom:-46px;
    width:220px;
    height:220px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(82,140,103,.18), transparent 68%);
    pointer-events:none;
    transition:transform .42s ease, opacity .42s ease;
  }

  .dsw-map-hero::after{
    content:"";
    position:absolute;
    left:-24px;
    top:-22px;
    width:160px;
    height:160px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(169,122,52,.16), transparent 70%);
    pointer-events:none;
    transition:transform .42s ease, opacity .42s ease;
  }

  .dsw-map-hero:hover{
    transform:translateY(-7px) perspective(1400px) rotateX(3deg) rotateY(-2deg);
    background:
      linear-gradient(135deg, rgba(255,255,255,.99) 0%, rgba(232,244,236,.98) 50%, rgba(244,236,222,.96) 100%);
    box-shadow:var(--dsw-shadow-strong), var(--dsw-inset);
    border-color:rgba(169,122,52,.18);
  }

  .dsw-map-hero-inner{
    position:relative;
    z-index:1;
    display:block;
  }

  .dsw-map-kicker{
    display:inline-flex;
    align-items:center;
    gap:10px;
    width:max-content;
    max-width:100%;
    padding:10px 18px 10px 16px;
    margin-bottom:18px;
    color:#234d34;
    font-size:13px;
    font-weight:800;
    letter-spacing:.12em;
    text-transform:uppercase;
    background:linear-gradient(180deg, #fbf7ef 0%, #ebe0ca 100%);
    border:1px solid rgba(117,90,37,.20);
    border-radius:14px;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.65),
      0 10px 20px rgba(70,55,28,.10);
  }

  .dsw-map-kicker::before{
    content:"";
    width:10px;
    height:10px;
    border-radius:50%;
    background:linear-gradient(180deg, #4f8a62 0%, #2f6b46 100%);
    box-shadow:0 0 0 4px rgba(79,138,98,.12);
    flex:0 0 auto;
  }

  .dsw-map-title{
    margin:0 0 12px;
    font-size:42px;
    line-height:1.15;
    font-weight:900;
    letter-spacing:-0.04em;
    color:#213126;
  }

  .dsw-map-title-brand{
    background:linear-gradient(180deg, #3f7a55 0%, #24563a 58%, #173d29 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    color:transparent;
  }

  .dsw-map-desc{
    margin:0;
    max-width:760px;
    font-size:18px;
    line-height:1.8;
    color:#506257;
    word-break:keep-all;
  }

  .dsw-map-wrap{
    position:relative;
    width:100%;
    height:min(78vh, 820px);
    min-height:520px;
    border-radius:30px;
    overflow:hidden;
    background:#dfe9df;
    border:1px solid rgba(255,255,255,.78);
    box-shadow:var(--dsw-shadow), var(--dsw-inset);
  }

  #full-map{
    width:100%;
    height:100%;
  }

  .map-location-panel{
    position:absolute;
    left:24px;
    bottom:24px;
    z-index:20;
    width:min(360px, calc(100% - 48px));
    padding:16px;
    border-radius:24px;
    background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(249,250,246,.93));
    border:1px solid rgba(255,255,255,.78);
    box-shadow:var(--dsw-shadow), var(--dsw-inset);
    backdrop-filter:blur(10px);
  }

  .map-location-panel-title{
    font-size:16px;
    font-weight:900;
    color:#203128;
    margin-bottom:6px;
  }

  .map-location-panel-sub{
    font-size:13px;
    color:#66706a;
    margin-bottom:14px;
    line-height:1.45;
  }

  .map-location-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .map-location-card{
    appearance:none;
    border:1px solid rgba(47,107,70,.14);
    background:#ffffff;
    border-radius:18px;
    padding:14px 14px 13px;
    text-align:left;
    cursor:pointer;
    transition:
      transform .22s ease,
      box-shadow .22s ease,
      border-color .22s ease,
      background .22s ease;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.7),
      0 10px 18px rgba(22,40,29,.06);
    width:100%;
  }

  .map-location-card:hover{
    transform:translateY(-2px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.82),
      0 16px 24px rgba(22,40,29,.10);
    border-color:rgba(169,122,52,.18);
    background:
      linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(240,248,242,.96) 55%, rgba(247,241,230,.92) 100%);
  }

  .map-location-card.active{
    border-color:#2f6b4b;
    background:linear-gradient(180deg, #f7fbf8 0%, #eef7f1 100%);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.82),
      0 16px 24px rgba(47,107,75,.14);
  }

  .map-location-card-num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:24px;
    height:24px;
    border-radius:999px;
    background:linear-gradient(180deg, #4b8b63 0%, #2f6b4b 100%);
    color:#fff;
    font-size:12px;
    font-weight:800;
    margin-right:8px;
    vertical-align:middle;
    box-shadow:0 6px 14px rgba(47,107,75,.24);
  }

  .map-location-card-title{
    display:inline-block;
    vertical-align:middle;
    font-size:16px;
    font-weight:800;
    color:#1f4d35;
  }

  .map-location-card-address{
    margin-top:8px;
    padding-left:32px;
    font-size:13px;
    color:#66706a;
    line-height:1.5;
    font-weight:500;
  }

  .marker-label-custom{
    font-family:'Pretendard','Noto Sans KR',sans-serif;
    font-size:15px;
    font-weight:700;
    padding:13px 16px;
    background:#ffffff;
    border:1px solid rgba(36,86,58,.18);
    border-radius:16px;
    color:#1f4d35;
    box-shadow:0 14px 30px rgba(17,24,39,.16);
    text-align:center;
    white-space:nowrap;
    max-width:280px;
    line-height:1.45;
  }

  .marker-title{
    font-size:17px;
    margin-bottom:4px;
    color:#1f4d35;
    font-weight:800;
  }

  .marker-sub{
    font-size:13px;
    color:#5f6660;
    font-weight:500;
  }

  .marker-icon{
    width:46px;
    height:62px;
    background:url('https://cdn.imweb.me/upload/S20250616705368ebc899d/3e0af01e5664f.png') no-repeat center;
    background-size:contain;
    filter:drop-shadow(0 10px 14px rgba(0,0,0,.2));
  }

  @media (max-width: 767px){
    .dsw-map-page{
      padding:16px 10px 100px;
    }

    .dsw-map-hero{
      padding:22px 16px;
      border-radius:22px;
      margin-bottom:16px;
    }

    .dsw-map-hero:hover{
      transform:none;
    }

    .dsw-map-kicker{
      font-size:10.5px;
      padding:8px 11px;
      margin-bottom:12px;
      letter-spacing:.06em;
    }

    .dsw-map-title{
      font-size:28px;
      line-height:1.18;
    }

    .dsw-map-desc{
      font-size:14px;
      line-height:1.7;
    }

    .dsw-map-wrap{
      height:68vh;
      min-height:460px;
      border-radius:22px;
    }

    .map-location-panel{
      left:10px;
      right:auto;
      bottom:10px;
      width:220px;
      max-width:220px;
      padding:8px;
      border-radius:14px;
      box-shadow:
        0 8px 20px rgba(22,40,29,.14),
        var(--dsw-inset);
    }

    .map-location-panel-title{
      font-size:12px;
      margin-bottom:1px;
      line-height:1.2;
    }

    .map-location-panel-sub{
      font-size:10px;
      margin-bottom:5px;
      line-height:1.25;
    }

    .map-location-list{
      gap:5px;
    }

    .map-location-card{
      padding:7px 8px;
      border-radius:10px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.7),
        0 5px 10px rgba(22,40,29,.05);
    }

    .map-location-card:hover{
      transform:none;
    }

    .map-location-card-num{
      width:17px;
      height:17px;
      font-size:8.5px;
      margin-right:5px;
      box-shadow:0 4px 8px rgba(47,107,75,.18);
    }

    .map-location-card-title{
      font-size:11.5px;
    }

    .map-location-card-address{
      margin-top:2px;
      padding-left:22px;
      font-size:9.5px;
      line-height:1.25;
    }

    .marker-label-custom{
      max-width:210px;
      white-space:normal;
      font-size:12px;
      padding:9px 11px;
      border-radius:12px;
    }

    .marker-title{
      font-size:13px;
      margin-bottom:2px;
    }

    .marker-sub{
      font-size:10.5px;
    }
  }

  @media (max-width: 390px){
    .map-location-panel{
      width:205px;
      max-width:205px;
      left:8px;
      bottom:8px;
      padding:7px;
    }

    .map-location-card-title{
      font-size:11px;
    }

    .map-location-card-address{
      font-size:9px;
    }
  }
</style>

<div class="dsw-map-page">
  <div class="dsw-map-container">

    <section class="dsw-map-hero">
      <div class="dsw-map-hero-inner">
        <div>
          <div class="dsw-map-kicker">THE SUWON CARE CENTER</div>
          <h1 class="dsw-map-title">
            <span class="dsw-map-title-brand">더수원</span> 오시는 길
          </h1>
          <p class="dsw-map-desc">
            방문하실 시설을 선택하시면 해당 위치로 지도가 이동합니다.
            더수원 주간보호와 요양원을 한눈에 확인하실 수 있습니다.
          </p>
        </div>
      </div>
    </section>

    <section class="dsw-map-wrap">
      <div id="full-map"></div>

      <div class="map-location-panel">
        <div class="map-location-panel-title">시설 선택</div>
        <div class="map-location-panel-sub">원하시는 지점을 선택해 주세요.</div>
        <div class="map-location-list" id="mapLocationList"></div>
      </div>
    </section>

  </div>
</div>

<div id="site-footer"></div>

<script src="layout.js"></script>

<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=igssinu6xy&submodules=geocoder"></script>

<script>
  const placeList = [
    {
      title: "더수원 주간보호",
      address: "경기도 수원시 팔달구 정조로 804"
    },
    {
      title: "더수원 요양원",
      address: "경기도 수원시 팔달구 중부대로125번길 14"
    }
  ];

  const map = new naver.maps.Map('full-map', {
    zoom: 16,
    mapTypeControl: true
  });

  const placeObjects = [];
  const locationListEl = document.getElementById('mapLocationList');
  let completedCount = 0;

  function setActiveCard(index) {
    const cards = document.querySelectorAll('.map-location-card');
    cards.forEach((card, i) => {
      card.classList.toggle('active', i === index);
    });
  }

  function focusPlace(index) {
    const target = placeObjects[index];
    if (!target) return;

    placeObjects.forEach(obj => obj.infowindow.close());

    const offsetLat = window.innerWidth <= 767 ? 0.0010 : 0.0022;
    const adjustedCenter = new naver.maps.LatLng(
      target.position.lat() + offsetLat,
      target.position.lng()
    );

    map.setCenter(adjustedCenter);
    map.setZoom(16);

    setTimeout(() => {
      target.infowindow.open(map, target.marker);
    }, 140);

    setActiveCard(index);
  }

  placeList.forEach((place, index) => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'map-location-card';
    card.innerHTML = `
      <span class="map-location-card-num">${index + 1}</span>
      <span class="map-location-card-title">${place.title}</span>
      <div class="map-location-card-address">${place.address}</div>
    `;
    card.disabled = true;
    locationListEl.appendChild(card);

    naver.maps.Service.geocode({ query: place.address }, function(status, response) {
      completedCount += 1;

      if (status !== naver.maps.Service.Status.OK) {
        console.error("주소 검색 실패:", place.address);
        card.querySelector('.map-location-card-address').textContent = "주소 확인 실패";
        if (completedCount === placeList.length && placeObjects.length) {
          focusPlace(0);
        }
        return;
      }

      const result = response.v2;
      if (!result || !result.addresses || result.addresses.length === 0) {
        console.error("검색 결과 없음:", place.address);
        card.querySelector('.map-location-card-address').textContent = "검색 결과 없음";
        if (completedCount === placeList.length && placeObjects.length) {
          focusPlace(0);
        }
        return;
      }

      const first = result.addresses[0];
      const lat = parseFloat(first.y);
      const lng = parseFloat(first.x);
      const position = new naver.maps.LatLng(lat, lng);

      const marker = new naver.maps.Marker({
        position: position,
        map: map,
        icon: {
          content: '<div class="marker-icon"></div>',
          anchor: new naver.maps.Point(23, 62)
        }
      });

      const infowindow = new naver.maps.InfoWindow({
        content: `
          <div class="marker-label-custom">
            <div class="marker-title">${place.title}</div>
            <div class="marker-sub">${place.address}</div>
          </div>
        `,
        borderWidth: 0,
        backgroundColor: "transparent",
        disableAnchor: false,
        pixelOffset: new naver.maps.Point(0, -10)
      });

      placeObjects[index] = {
        position,
        marker,
        infowindow
      };

      card.disabled = false;

      card.addEventListener('click', function() {
        focusPlace(index);
      });

      naver.maps.Event.addListener(marker, 'click', function() {
        focusPlace(index);
      });

      if (completedCount === placeList.length && placeObjects.filter(Boolean).length) {
        focusPlace(0);
      }
    });
  });
</script>

</body>
</html>
