<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="layout.css">

<div id="site-header"></div>

<style>
  html, body {
    margin: 0;
    padding: 0;
  }

  .dsw-map-page{
    font-family:'Pretendard','Noto Sans KR',sans-serif;
    background:linear-gradient(180deg, #f4efe5 0%, #edf4ee 100%);
    padding:30px 20px 110px;
  }

  .dsw-map-container{
    max-width:1280px;
    margin:0 auto;
  }

  /* 🔥 타이틀 카드 */
  .dsw-map-hero{
    position:relative;
    margin-bottom:22px;
    padding:34px 30px;
    border-radius:30px;
    background:linear-gradient(135deg, #ffffff 0%, #eef5f0 100%);
    box-shadow:0 18px 40px rgba(0,0,0,.12);
    overflow:hidden;
    transition:all .4s ease;
  }

  /* ✨ 3D 호버 효과 */
  .dsw-map-hero:hover{
    transform:translateY(-6px) scale(1.01);
    background:
      linear-gradient(135deg, #ffffff 0%, #e3f1e8 60%, #f4efe5 100%);
    box-shadow:0 28px 60px rgba(0,0,0,.18);
  }

  .dsw-map-title{
    font-size:42px;
    font-weight:900;
  }

  .dsw-map-title-brand{
    background:linear-gradient(180deg,#3f7a55,#173d29);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .dsw-map-desc{
    font-size:18px;
    color:#506257;
  }

  .dsw-map-wrap{
    position:relative;
    height:70vh;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.12);
  }

  #full-map{
    width:100%;
    height:100%;
  }

  /* 카드 */
  .map-location-panel{
    position:absolute;
    left:20px;
    bottom:20px;
    width:320px;
    padding:16px;
    border-radius:20px;
    background:rgba(255,255,255,.95);
    backdrop-filter:blur(10px);
    box-shadow:0 18px 40px rgba(0,0,0,.18);
  }

  .map-location-card{
    padding:14px;
    border-radius:14px;
    background:#fff;
    margin-bottom:10px;
    cursor:pointer;
    transition:.2s;
    border:1px solid #ddd;
  }

  .map-location-card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.1);
  }

  .map-location-card.active{
    border:2px solid #2f6b4b;
  }

  .marker-label-custom{
    background:#fff;
    padding:12px;
    border-radius:14px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
  }

</style>

<div class="dsw-map-page">
  <div class="dsw-map-container">

    <div class="dsw-map-hero">
      <h1 class="dsw-map-title">
        <span class="dsw-map-title-brand">더수원</span> 오시는 길
      </h1>
      <p class="dsw-map-desc">시설을 선택하면 해당 위치로 이동합니다</p>
    </div>

    <div class="dsw-map-wrap">
      <div id="full-map"></div>

      <div class="map-location-panel" id="mapLocationList"></div>
    </div>

  </div>
</div>

<div id="site-footer"></div>
<script src="layout.js"></script>

<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=igssinu6xy"></script>

<script>
const placeList = [
  {
    title: "더수원 주간보호",
    address: "정조로 804",
    lat: 37.2809,
    lng: 127.0153
  },
  {
    title: "더수원 요양원",
    address: "중부대로125번길 14",
    lat: 37.2778,
    lng: 127.0282
  }
];

const map = new naver.maps.Map('full-map', {
  center: new naver.maps.LatLng(placeList[0].lat, placeList[0].lng),
  zoom: 16
});

const placeObjects = [];
const panel = document.getElementById('mapLocationList');

function focusPlace(index){
  const p = placeObjects[index];

  placeObjects.forEach(o=>o.info.close());

  // 🔥 카드 가림 보정 (위쪽으로 이동)
  const offset = 0.0025;
  const newPos = new naver.maps.LatLng(
    p.position.lat() + offset,
    p.position.lng()
  );

  map.panTo(newPos);

  setTimeout(()=>{
    map.setZoom(17);
    p.info.open(map, p.marker);
  },200);

  document.querySelectorAll('.map-location-card').forEach((c,i)=>{
    c.classList.toggle('active', i===index);
  });
}

placeList.forEach((place, index)=>{
  const pos = new naver.maps.LatLng(place.lat, place.lng);

  const marker = new naver.maps.Marker({
    position: pos,
    map: map
  });

  const info = new naver.maps.InfoWindow({
    content: `
      <div class="marker-label-custom">
        <strong>${place.title}</strong><br>${place.address}
      </div>`
  });

  placeObjects.push({position:pos, marker, info});

  const card = document.createElement('div');
  card.className='map-location-card';
  card.innerHTML = `<strong>${index+1}. ${place.title}</strong><br>${place.address}`;
  card.onclick=()=>focusPlace(index);

  panel.appendChild(card);

  naver.maps.Event.addListener(marker,'click',()=>focusPlace(index));
});

window.onload=()=>focusPlace(0);
</script>
