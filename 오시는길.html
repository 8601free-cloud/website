<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>오시는길 | 수원 주간보호·요양원 위치 안내 | 더수원 어르신 통합케어</title>
  <meta name="description" content="더수원 어르신 통합케어 오시는 길 안내입니다. 수원 팔달구 더수원 주간보호와 요양원의 위치, 주소, 방문 경로를 확인해보세요.">
  <meta property="og:title" content="오시는길 | 수원 주간보호·요양원 위치 안내 | 더수원 어르신 통합케어">
  <meta property="og:description" content="더수원 주간보호 및 요양원 위치와 방문 경로를 안내합니다.">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="layout.css?v=20260501">
</head>
<body>

<div id="site-header"></div>

<style>
html,body{margin:0;padding:0;}
*{box-sizing:border-box;}

:root{
  --dsw-green:#2f6b46;
  --dsw-gold:#a97a34;
  --dsw-text:#223129;
  --dsw-shadow:0 14px 34px rgba(22,40,29,.12),0 4px 10px rgba(22,40,29,.06);
  --dsw-inset:inset 0 1px 0 rgba(255,255,255,.65), inset 0 -1px 0 rgba(20,40,25,.05);
}

.dsw-map-page{
  font-family:'Pretendard','Noto Sans KR',sans-serif;
  color:var(--dsw-text);
  background:
    radial-gradient(circle at 8% 8%, rgba(136,184,154,.18), transparent 24%),
    radial-gradient(circle at 92% 14%, rgba(169,122,52,.10), transparent 22%),
    linear-gradient(180deg,#f4efe5 0%,#f7f8f3 34%,#edf4ee 100%);
  padding:30px 20px 110px;
}

.dsw-map-container{
  width:100%;
  max-width:1280px;
  margin:0 auto;
}

.dsw-map-hero{
  margin-bottom:22px;
  padding:34px 30px;
  border-radius:30px;
  background:linear-gradient(135deg, rgba(255,255,255,.96) 0%, rgba(245,248,243,.96) 52%, rgba(236,244,237,.97) 100%);
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--dsw-shadow), var(--dsw-inset);
}

.dsw-map-kicker{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 18px 10px 16px;
  margin-bottom:18px;
  font-size:13px;
  font-weight:800;
  border-radius:14px;
  background:linear-gradient(180deg,#fbf7ef 0%,#ebe0ca 100%);
}

.dsw-map-title{
  margin:0 0 12px;
  font-size:42px;
  font-weight:900;
  line-height:1.15;
}

.dsw-map-title-brand{
  background:linear-gradient(180deg,#3f7a55 0%,#24563a 58%,#173d29 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.dsw-map-desc{
  margin:0;
  max-width:760px;
  font-size:18px;
  line-height:1.8;
  color:#506257;
}

.dsw-map-wrap{
  position:relative;
  width:100%;
  height:min(78vh,820px);
  min-height:520px;
  border-radius:30px;
  overflow:hidden;
  background:#dfe9df;
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--dsw-shadow), var(--dsw-inset);
}

#full-map{
  width:100%;
  height:100%;
}

.map-location-panel{
  position:absolute;
  left:24px;
  bottom:24px;
  z-index:20;
  width:min(360px,calc(100% - 48px));
  padding:16px;
  border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(249,250,246,.93));
  border:1px solid rgba(255,255,255,.78);
  box-shadow:var(--dsw-shadow), var(--dsw-inset);
  backdrop-filter:blur(10px);
}

.map-location-panel-title{
  font-size:16px;
  font-weight:900;
  margin-bottom:6px;
}

.map-location-panel-sub{
  font-size:13px;
  color:#66706a;
  margin-bottom:14px;
}

.map-location-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.map-location-card{
  border:1px solid rgba(47,107,70,.14);
  background:#fff;
  border-radius:18px;
  padding:14px;
  cursor:pointer;
  width:100%;
}

.map-location-card.active{
  border-color:#2f6b4b;
  background:linear-gradient(180deg,#f7fbf8 0%,#eef7f1 100%);
}

.map-location-card-num{
  display:inline-flex;
  width:24px;
  height:24px;
  border-radius:50%;
  align-items:center;
  justify-content:center;
  background:#2f6b4b;
  color:#fff;
  font-size:12px;
  font-weight:800;
  margin-right:8px;
}

.map-location-card-title{
  font-size:16px;
  font-weight:800;
}

.map-location-card-address{
  margin-top:8px;
  padding-left:32px;
  font-size:13px;
  color:#66706a;
}

.marker-icon{
  width:46px;
  height:62px;
  background:url('https://cdn.imweb.me/upload/S20250616705368ebc899d/3e0af01e5664f.png') no-repeat center;
  background-size:contain;
}

@media (max-width:767px){

  .dsw-map-page{
    padding:18px 10px 100px;
  }

  .dsw-map-hero{
    padding:24px 16px;
    border-radius:20px;
  }

  .dsw-map-title{
    font-size:28px;
  }

  .dsw-map-desc{
    font-size:14px;
    line-height:1.7;
  }

  .dsw-map-wrap{
    height:68vh;
    min-height:430px;
    border-radius:20px;
  }

  .map-location-panel{
    left:10px;
    right:10px;
    bottom:10px;
    width:auto;
    padding:10px;
    border-radius:16px;
    max-height:185px;
    overflow-y:auto;
  }

  .map-location-panel-title{
    font-size:14px;
    margin-bottom:2px;
  }

  .map-location-panel-sub{
    font-size:11.5px;
    margin-bottom:8px;
    line-height:1.3;
  }

  .map-location-list{
    gap:6px;
  }

  .map-location-card{
    padding:9px 10px;
    border-radius:12px;
  }

  .map-location-card-num{
    width:20px;
    height:20px;
    font-size:10px;
    margin-right:6px;
  }

  .map-location-card-title{
    font-size:13.5px;
  }

  .map-location-card-address{
    margin-top:4px;
    padding-left:27px;
    font-size:11px;
    line-height:1.35;
  }

}
</style>

<div class="dsw-map-page">
  <div class="dsw-map-container">

    <section class="dsw-map-hero">
      <div class="dsw-map-kicker">THE SUWON CARE CENTER</div>
      <h1 class="dsw-map-title">
        <span class="dsw-map-title-brand">더수원</span> 오시는 길
      </h1>
      <p class="dsw-map-desc">
        방문하실 시설을 선택하시면 해당 위치로 지도가 이동합니다.
        더수원 주간보호와 요양원을 한눈에 확인하실 수 있습니다.
      </p>
    </section>

    <section class="dsw-map-wrap">
      <div id="full-map"></div>

      <div class="map-location-panel">
        <div class="map-location-panel-title">시설 선택</div>
        <div class="map-location-panel-sub">원하시는 지점을 선택해 주세요.</div>
        <div class="map-location-list" id="mapLocationList"></div>
      </div>
    </section>

  </div>
</div>

<div id="site-footer"></div>

<script src="layout.js"></script>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=igssinu6xy&submodules=geocoder"></script>

<script>
const placeList = [
  { title:"더수원 주간보호", address:"경기도 수원시 팔달구 정조로 804" },
  { title:"더수원 요양원", address:"경기도 수원시 팔달구 중부대로125번길 14" }
];

const map = new naver.maps.Map('full-map',{ zoom:16, mapTypeControl:true });

const placeObjects = [];
const locationListEl = document.getElementById('mapLocationList');
let completedCount = 0;

function setActiveCard(index){
  document.querySelectorAll('.map-location-card').forEach((card,i)=>{
    card.classList.toggle('active', i===index);
  });
}

function focusPlace(index){
  const target = placeObjects[index];
  if(!target) return;

  placeObjects.forEach(obj=>obj.infowindow.close());

  const offsetLat = window.innerWidth <= 767 ? 0.0015 : 0.0022;

  map.setCenter(new naver.maps.LatLng(
    target.position.lat()+offsetLat,
    target.position.lng()
  ));

  map.setZoom(16);

  setTimeout(()=>{
    target.infowindow.open(map,target.marker);
  },140);

  setActiveCard(index);
}

placeList.forEach((place,index)=>{
  const card = document.createElement('button');
  card.type='button';
  card.className='map-location-card';
  card.innerHTML=`
    <span class="map-location-card-num">${index+1}</span>
    <span class="map-location-card-title">${place.title}</span>
    <div class="map-location-card-address">${place.address}</div>
  `;
  card.disabled=true;
  locationListEl.appendChild(card);

  naver.maps.Service.geocode({query:place.address},function(status,response){
    completedCount++;

    if(status!==naver.maps.Service.Status.OK) return;

    const first=response.v2.addresses[0];
    const position=new naver.maps.LatLng(parseFloat(first.y),parseFloat(first.x));

    const marker=new naver.maps.Marker({
      position,
      map,
      icon:{
        content:'<div class="marker-icon"></div>',
        anchor:new naver.maps.Point(23,62)
      }
    });

    const infowindow=new naver.maps.InfoWindow({
      content:`<div style="padding:12px 14px;background:#fff;border-radius:14px;font-weight:700;">${place.title}</div>`,
      borderWidth:0,
      backgroundColor:"transparent"
    });

    placeObjects[index]={position,marker,infowindow};

    card.disabled=false;
    card.addEventListener('click',()=>focusPlace(index));
    naver.maps.Event.addListener(marker,'click',()=>focusPlace(index));

    if(completedCount===placeList.length){
      focusPlace(0);
    }
  });
});
</script>

</body>
</html>
