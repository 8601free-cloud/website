<style>
  html, body {
    margin: 0;
    padding: 0;
  }

  #full-map {
    width: 100%;
    height: 100dvh;
  }

  .marker-label-custom {
    font-family: "Noto Sans KR", sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 16px;
    background: #ffffff;
    border: 2px solid #d32f2f;
    border-radius: 12px;
    color: #d32f2f;
    box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
    text-align: center;
    white-space: nowrap;
    max-width: 260px;
    line-height: 1.45;
  }

  .marker-title {
    font-size: 17px;
    margin-bottom: 4px;
    color: #b71c1c;
  }

  .marker-sub {
    font-size: 13px;
    color: #444;
    font-weight: 500;
  }

  .marker-icon {
    width: 42px;
    height: 58px;
    background: url('https://cdn.imweb.me/upload/S20250616705368ebc899d/3e0af01e5664f.png') no-repeat center;
    background-size: contain;
  }
</style>

<div id="full-map"></div>

<script src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=k34r1veqgp"></script>

<script>
  // 좌표 직접 입력 권장
  const placeList = [
    {
      title: "더수원 주간보호",
      address: "경기도 수원시 팔달구 정조로 804",
      lat: 37.2809,
      lng: 127.0153
    },
    {
      title: "더수원 요양원",
      address: "경기도 수원시 팔달구 중부대로125번길 14",
      lat: 37.2778,
      lng: 127.0282
    }
  ];

  const map = new naver.maps.Map('full-map', {
    center: new naver.maps.LatLng(placeList[0].lat, placeList[0].lng),
    zoom: 14,
    mapTypeControl: true
  });

  const bounds = new naver.maps.LatLngBounds();
  const infoWindows = [];

  placeList.forEach((place, index) => {
    const position = new naver.maps.LatLng(place.lat, place.lng);
    bounds.extend(position);

    const marker = new naver.maps.Marker({
      position: position,
      map: map,
      icon: {
        content: '<div class="marker-icon"></div>',
        anchor: new naver.maps.Point(21, 58)
      }
    });

    const infowindow = new naver.maps.InfoWindow({
      content: `
        <div class="marker-label-custom">
          <div class="marker-title">${place.title}</div>
          <div class="marker-sub">${place.address}</div>
        </div>
      `,
      borderWidth: 0,
      backgroundColor: "transparent",
      disableAnchor: false,
      pixelOffset: new naver.maps.Point(0, -8)
    });

    infoWindows.push(infowindow);

    naver.maps.Event.addListener(marker, 'click', function() {
      infoWindows.forEach(iw => iw.close());
      infowindow.open(map, marker);
    });

    // 첫 번째 마커만 기본 오픈
    if (index === 0) {
      infowindow.open(map, marker);
    }
  });

  map.fitBounds(bounds);

  // fitBounds 후 너무 가까우면 줌이 과하게 들어갈 수 있어 약간 보정
  naver.maps.Event.once(map, 'idle', function() {
    const currentZoom = map.getZoom();
    if (currentZoom > 15) {
      map.setZoom(15);
    }
  });
</script>
